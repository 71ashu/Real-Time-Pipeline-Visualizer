services:
  backend:
    build: ./backend
    ports:
      - "8080:8080"
    environment:
      - PORT=8080

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_BASE_URL: http://localhost:8080
        VITE_WS_URL: ws://localhost:8080/ws
    ports:
      - "4173:80"
    depends_on:
      - backend
